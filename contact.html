<div class="container">
  <h2>Submit New Recipe</h2>
  <form method="POST" action="contact.html" enctype="multipart/form-data">
    <label>Recipe Name *</label>
    <input type="text" name="name" required>

    <label>Category</label>
    <select name="category">
      <option>Curry</option>
      <option>Salad</option>
      <option>Rice</option>
      
    </select>

    <label>Ingredients *</label>
    <textarea rows="3" name="ingredients" required></textarea>

    <label>Instructions *</label>
    <textarea rows="3" name="instructions" required></textarea>

    <label>Cooking Time</label>
    <input type="text" name="cooking_time">

    <label>Upload Image</label>
    <input type="file" name="image">

    <button type="submit" name="submit">Submit</button>
    <button type="reset">Reset</button>
  </form>
